# .github/workflows/metrics.yml
# v3 - keeps only the cards that render well; languages/stats now come from
# your self-hosted github-readme-stats instance (see README)
name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ── Full-year isometric contribution calendar ──
      - name: Contribution calendar card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bharathkumarraju
          filename: metrics-isocalendar.svg
          template: classic
          config_timezone: Asia/Singapore
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

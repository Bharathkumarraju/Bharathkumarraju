# Save as: .github/workflows/metrics.yml  (replaces previous version)
name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ── Full-year isometric contribution calendar (working) ──
      - name: Contribution calendar card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bharathkumarraju
          filename: metrics-isocalendar.svg
          template: classic
          config_timezone: Asia/Singapore
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Languages card retry: ALONE this time, no habits plugin ──
      - name: Languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bharathkumarraju
          filename: metrics-languages.svg
          template: classic
          config_timezone: Asia/Singapore
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

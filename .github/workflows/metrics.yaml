# Save this as: .github/workflows/metrics.yml
# in your Bharathkumarraju/Bharathkumarraju profile repo
name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"   # regenerate daily at midnight UTC
  workflow_dispatch:       # allow manual runs from the Actions tab
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bharathkumarraju
          template: classic
          filename: github-metrics.svg
          config_timezone: Asia/Singapore

          # Base sections: header, activity, community, repositories
          base: header, activity, community, repositories, metadata

          # Languages card (replaces "Top Languages")
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

          # Contribution calendar (replaces streak/contribution graph)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
